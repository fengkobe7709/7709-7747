<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CSOP Premium Monitor</title>
  <link rel="stylesheet" href="/static/style.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <main class="wrap">
    <header>
      <div>
        <h1>CSOP Premium Monitor</h1>
        <p>7709 / 7747 官方 iNAV 与延迟 Market Price 折溢价监控</p>
      </div>
      <button id="refreshBtn">刷新</button>
    </header>

    <section id="cards" class="cards"></section>

    <section class="chartBox">
      <div class="chartHeader">
        <h2>折溢价历史</h2>
        <span id="lastUpdated">--</span>
      </div>
      <canvas id="premiumChart" height="110"></canvas>
    </section>

    <footer>
      数据来源：CSOP 官网。Market Price 可能至少延迟 15 分钟；iNAV 与 Market Price 更新时间可能不同。
    </footer>
  </main>
  <script src="/static/app.js"></script>
</body>
</html>
